name: Deploy WordPress VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.61.47.145
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          script: |
            cd /home/painel/htdocs/painel.eltuniversity.com
            git fetch origin main
            git reset --hard origin/main
            git pull origin main
            chown -R painel:painel /home/painel/htdocs/painel.eltuniversity.com
